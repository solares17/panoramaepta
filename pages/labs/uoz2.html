<!DOCTYPE html>
<html lang="ru">
<head>
<title>Антенно-фидерные устройства</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/panoramaepta/style.css">
<link rel="stylesheet" href="/panoramaepta/styles/uoz.css">
</head>

<body>
    
<div id="include-header"></div>
    
   
<div class="page-content">

    
    <div class="content-container">
        <div class="info-text">
        <h2>Лабораторная работа №1 - Измерение КУ и фазовых сдвигов</h2>
        <p>
        Для выполнения лабораторной работы ознакомьтесь с видео:
        </p>
        </div> 

        <div class="info-text">
        <p>
        Эмуляция лабораторного стенда:
        </p>
        </div> 
        <div class="stand-container">

        <!-- Сигнал -->

        <div class="panel">
        <h3>Сигнал</h3>
        <label>Частота сигнала (Гц)</label>
        <input type="number" id="freq" min="30" max="15000" value="1000">

        <label>Амплитуда сигнала (В)</label>
        <input type="number" id="sigAmp" min="0.1" max="1" step="0.1" value="0.3">
        <button id="toggleSignal">Включить</button>
        </div>

            
        <!-- Гетеродин -->
        <div class="panel">
        <h3>Гетеродин</h3>

        <p>Частота: <b>465 кГц</b></p>

        <label>Амплитуда гетеродина (В)</label>
        <input type="number" id="amp" min="0.1" max="1" step="0.1" value="0.5">
        </div>

        <!-- Детектор -->
        <div class="panel">
        <h3>Детектор</h3>
        <select id="detector">
        <option value="diode">Диодный</option>
        <option value="sync">Синхронный</option>
        <option value="env">Огибающий</option>
        </select>
        </div>

        <!-- Нагрузка -->
        <div class="panel">
        <h3>Нагрузка</h3>
        <label><input type="checkbox" id="R1"> R1</label><br>
        <label><input type="checkbox" id="R2"> R2</label><br>
        <label><input type="checkbox" id="C1"> C1</label><br>
        <label><input type="checkbox" id="C2"> C2</label>

        </div>

        <!-- Задание -->
        <div class="panel">
        <h3>Задание</h3>
        <select id="task">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        </select>
        </div>

        <!-- Выход -->
        <div class="panel screen-panel">
        <h3>Экран</h3>

        <div class="screen">
        <p>U = <span id="U">0</span> мВ</p>
        <p>Uc = <span id="Uc">0</span> мВ</p>
        </div>
        </div>
    
        </div>

    
    </div>
</div>

  
<div id="include-footer"></div>
<script src="/panoramaepta/scripts/uoz2.js"></script>
<script src="/panoramaepta/scripts/include.js"></script>

</body>
</html>
