<!DOCTYPE html>
<html lang="ru">
<head>
<title>Антенно-фидерные устройства</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/panoramaepta/style.css">
<link rel="stylesheet" href="/panoramaepta/styles/uoz.css">
</head>

<body>
    
<div id="include-header"></div>
    
   
<div class="page-content">

    
    <div class="panel">

  <h2>УОС-02 — Амплитудный детектор</h2>

  <!-- РЕЖИМ -->
  <div class="block">
    <label>Задание:</label>
    <select id="mode">
      <option value="1">Задание 1</option>
      <option value="2">Задание 2</option>
      <option value="3">Задание 3</option>
      <option value="4">Задание 4</option>
      <option value="5">Задание 5</option>
    </select>
  </div>

  <!-- ДЕТЕКТОРЫ -->
  <div class="block">
    <label>Тип детектора:</label>
    <div class="buttons">
      <button class="det active" data-det="1">Тип 1</button>
      <button class="det" data-det="2">Тип 2</button>
      <button class="det" data-det="3">Тип 3</button>
    </div>
  </div>

  <!-- НАГРУЗКА -->
  <div class="block">
    <label>Нагрузка:</label>
    <div class="buttons">
      <button class="load" data-load="R1">R1</button>
      <button class="load" data-load="R2">R2</button>
      <button class="load" data-load="C1">C1</button>
      <button class="load" data-load="C2">C2</button>
    </div>
  </div>

  <!-- ВХОДНЫЕ ПАРАМЕТРЫ -->
  <div class="block inputs">
    <label>fс (кГц)</label>
    <input id="fc" type="number" value="1000">

    <label>fг (кГц)</label>
    <input id="fg" type="number" value="1465">

    <label>Uc (В)</label>
    <input id="uc" type="number" step="0.001" value="0.1">

    <label>Fm (кГц)</label>
    <input id="fm" type="number" value="1">
  </div>

  <!-- ЭКРАН -->
  <div id="screen" class="screen"></div>

    </div>
</div>

  
<div id="include-footer"></div>
<script src="/panoramaepta/scripts/uoz2.js"></script>
<script src="/panoramaepta/scripts/include.js"></script>

</body>
</html>
