<!DOCTYPE html>
<html lang="ru">
<head>
<title>Антенно-фидерные устройства</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/panoramaepta/style.css">
<link rel="stylesheet" href="/panoramaepta/styles/stand-antenna.css">
</head>

<body>
    
<div id="include-header"></div>
    
   
<div class="page-content">

    
    <div class="content-container">
        <div class="info-text">
        <h2>Лабораторная работа №1 - Измерение КУ и фазовых сдвигов</h2>
        <p>
        Для выполнения лабораторной работы ознакомьтесь с видео:
        </p>
        </div> 

        <div class="info-text">
        <p>
        Эмуляция лабораторного стенда:
        </p>
        </div> 
       
<div class="uos">
  <h2>Фазовая автоподстройка частоты УОС-05</h2>

  <div class="controls">
    <div class="block">
      <h3>Сигнал (fc)</h3>
      <div class="control-row">
        <label>Частота (кГц)</label>
        <input type="number" id="fc" min="440" max="510" value="475">
      </div>
      <div class="control-row">
        <label>Амплитуда (В)</label>
        <input type="number" id="uc" min="0" max="1" step="0.01" value="0.5">
      </div>
    </div>

    <div class="block">
      <h3>Шум (Uш)</h3>
      <div class="control-row">
        <label>Амплитуда (В)</label>
        <input type="number" id="un" min="0" max="2" step="0.1" value="0">
      </div>
      <div class="fixed">Полоса: 35 кГц</div>
    </div>

    <div class="block">
      <h3>Фильтры (ФНЧ/ПИФ)</h3>
      <div class="control-row">
        <label>ФНЧ Вкл</label>
        <input type="checkbox" id="lpf_en">
      </div>
      <div class="detector-group">
        <button data-cap="C1" class="cap active">C1 (22нФ)</button>
        <button data-cap="C2" class="cap">C2 (2нФ)</button>
      </div>
      <hr>
      <div class="control-row">
        <label>ПИФ Вкл</label>
        <input type="checkbox" id="pif_en">
      </div>
      <div class="detector-group">
        <button data-res="R1" class="res active">R1 (430Ω)</button>
        <button data-res="R2" class="res">R2 (51Ω)</button>
      </div>
    </div>

    <div class="block">
      <h3>Параметры петли</h3>
      <div class="control-row">
        <label>Усиление</label>
        <select id="gain">
          <option value="1.5">K1 (Высокое)</option>
          <option value="1.0">K2 (Низкое)</option>
        </select>
      </div>
      <div class="control-row">
        <label>Режим</label>
        <select id="mode">
          <option value="1">Задание 1: АЧХ фильтра</option>
          <option value="2">Задание 2: Своб. част. ГУН</option>
          <option value="3">Задание 3: Полосы (без фильтра)</option>
          <option value="4">Задание 4: Влияние ФНЧ/ПИФ</option>
          <option value="5">Задание 5: Влияние шума</option>
        </select>
      </div>
    </div>
  </div>

  <div class="screen" id="screen"></div>
</div>

        
    
    </div>
</div>

  
<div id="include-footer"></div>
<script src="/panoramaepta/scripts/stand-antenna.js"></script>
<script src="/panoramaepta/scripts/include.js"></script>

</body>
</html>
