<!DOCTYPE html>
<html lang="ru">
<head>
<title>Антенно-фидерные устройства</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/panoramaepta/style.css">
<link rel="stylesheet" href="/panoramaepta/styles/uoz.css">
</head>

<body>
    
<div id="include-header"></div>
    
   
<div class="page-content">

    
    <div class="content-container">
        <div class="info-text">
        <h2>Лабораторная работа №1 - Измерение КУ и фазовых сдвигов</h2>
        <p>
        Для выполнения лабораторной работы ознакомьтесь с видео:
        </p>
        </div> 


        <div class="info-text">
        <p>
        Эмуляция лабораторного стенда:
        </p>
        </div> 
       <div class="uos">
  <h2>Входная цепь УОС-04</h2>

  <div class="controls">

    <!-- ГВЧ (Генератор Высокой Частоты) -->
    <div class="block">
      <h3>G ≈ ГВЧ</h3>
      
      <div class="control-row">
        <label>Диапазон</label>
        <div class="radio-group">
          <!-- fmin...fcp, fmin...fmax, fcp...fmax -->
          <label><input type="radio" name="range" value="1" checked> 1</label>
          <label><input type="radio" name="range" value="2"> 2</label>
          <label><input type="radio" name="range" value="3"> 3</label>
        </div>
      </div>

      <div class="control-row">
        <label>Частота (кГц)</label>
        <input type="number" id="f_gvch" min="150" max="30000" value="1000">
      </div>
    </div>

    <!-- Входная цепь -->
    <div class="block">
      <h3>Входная цепь</h3>
      
      <div class="control-row">
        <label>Настройка</label>
        <input type="range" id="tuning" min="0" max="100" value="50">
      </div>
    </div>

    <!-- Связь (C1, C2, C3, M) -->
    <div class="block">
      <h3>Связь</h3>
      <div class="detector-group">
        <!-- Сделал кнопками в стиле твоего выбора детектора -->
        <button data-link="C1" class="det active">C1</button>
        <button data-link="C2" class="det">C2</button>
        <button data-link="C3" class="det">C3</button>
        <button data-link="M" class="det">M</button>
      </div>
    </div>

    <!-- Режим -->
    <div class="block">
      <h3>Режим работы</h3>
      <select id="mode_uos04">
        <option value="1">Исследование ВЦ</option>
        <option value="2">Задание 2</option>
        <!-- и так далее по методичке -->
      </select>
    </div>

  </div>

  <!-- Экран осциллографа/графика -->
  <div class="screen" id="screen_uos04"></div>

</div>

    
    </div>
</div>

  
<div id="include-footer"></div>
<script src="/panoramaepta/scripts/stand-antenna.js"></script>
<script src="/panoramaepta/scripts/include.js"></script>

</body>
</html>
