<!DOCTYPE html>
<html lang="ru">
<head>
<title>Антенно-фидерные устройства</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/panoramaepta/style.css">
<link rel="stylesheet" href="/panoramaepta/styles/stand-antenna.css">
</head>

<body>
    
<div id="include-header"></div>

    
<div class="page-content">
    <iframe width="560" height="315" src="https://www.youtube.com/embed/JF2TPR4Tkzw?si=ZqzvlIrDDrn9vQCP" 
    title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; 
    picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
    </iframe>

    <div class="stand-wrapper">

      <!-- картинка стенда -->
      <div class="stand-bg"></div>

      <!-- ВКЛ/ВЫКЛ -->
      <input type="checkbox" id="power" class="power-switch">

      <!-- Частота -->
      <input type="range" id="freq" min="1" max="10" step="0.1" class="slider freq-slider">
      <div class="display freq-display">0 ГГц</div>

      <!-- Напряженность -->
      <div class="display field-display">0</div>

      <!-- Аттенюатор -->
      <div class="attenuator">
        <button data-db="5">-5</button>
        <button data-db="10">-10</button>
        <button data-db="15">-15</button>
        <button data-db="20">-20</button>
        <button data-db="25">-25</button>
        <button data-db="30">-30</button>
      </div>

    </div>
    
</div>

  
<div id="include-footer"></div>

<script src="/panoramaepta/scripts/include.js"></script>

</body>
</html>
