<!DOCTYPE html>
<html lang="ru">
<head>
<title>Антенно-фидерные устройства</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/panoramaepta/style.css">
<link rel="stylesheet" href="/panoramaepta/styles/uoz.css">
</head>

<body>
    
<div id="include-header"></div>
    
   
<div class="page-content">

    
    <div class="content-container">
        <div class="info-text">
        <h2>Лабораторная работа №1 - Измерение КУ и фазовых сдвигов</h2>
        <p>
        Для выполнения лабораторной работы ознакомьтесь с видео:
        </p>
        </div> 

    
        <div class="info-text">
        <p>
        Эмуляция лабораторного стенда:
        </p>
        </div> 
<div class="uos">

  <h2>Частотный детектор УОС-03</h2>

  <div class="controls">

    <!-- Входной ЧМ-сигнал -->
    <div class="block">
      <h3>Входной ЧМ-сигнал</h3>

      <div class="control-row">
        <label>Несущая частота (кГц)</label>
        <input type="number" id="fc" min="100" max="6500" value="1000">
      </div>

      <div class="control-row">
        <label>Девиация (кГц)</label>
        <input type="number" id="dev" min="0" max="150" step="1" value="50">
      </div>

      <div class="control-row">
        <label>Амплитуда (В)</label>
        <input type="number" id="uc" min="0" max="1.0" step="0.1" value="0.5">
      </div>
    </div>

    <!-- Модулирующий сигнал -->
    <div class="block">
      <h3>Модулирующий сигнал</h3>

      <div class="control-row">
        <label>Частота (Гц)</label>
        <input type="number" id="fm" min="100" max="5000" step="100" value="1000">
      </div>
      
      <div class="fixed">
        Форма: Синус
      </div>
    </div>

    <!-- Тип детектора / Настройка контура -->
    <div class="block">
      <h3>Параметры детектора</h3>

      <div class="control-row">
        <label>Частота контура (кГц)</label>
        <input type="number" id="f0" min="100" max="6500" step="10" value="1000">
      </div>

      <!-- Использована та же группа кнопок, но под типы ЧД (или фильтры) -->
      <div class="detector-group">
        <button data-det="1" class="det active" title="Одиночный контур">Одиночный</button>
        <button data-det="2" class="det" title="Балансный детектор">Балансный</button>
        <button data-det="3" class="det" title="Дробный детектор">Дробный</button>
      </div>
    </div>

    <!-- Режим -->
    <div class="block">
      <h3>Режим работы</h3>
      <select id="mode">
        <option value="1">Задание 1 (Статическая характеристика)</option>
        <option value="2">Задание 2 (Динамический режим)</option>
        <option value="3">Задание 3 (Ограничение амплитуды)</option>
        <option value="4">Задание 4</option>
        <option value="5">Задание 5</option>
      </select>
    </div>

  </div>

  <!-- Экран -->
  <div class="screen" id="screen"></div>
</div>


        
</div> 

    
    </div>
</div>

  
<div id="include-footer"></div>
<script src="/panoramaepta/scripts/stand-antenna.js"></script>
<script src="/panoramaepta/scripts/include.js"></script>

</body>
</html>
