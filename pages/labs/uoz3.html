<!DOCTYPE html>
<html lang="ru">
<head>
<title>Антенно-фидерные устройства</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/panoramaepta/style.css">
<link rel="stylesheet" href="/panoramaepta/styles/uoz.css">
</head>

<body>
    
<div id="include-header"></div>
    
   
<div class="page-content">

    
    <div class="content-container">
        <div class="info-text">
        <h2>Лабораторная работа №1 - Измерение КУ и фазовых сдвигов</h2>
        <p>
        Для выполнения лабораторной работы ознакомьтесь с видео:
        </p>
        </div> 

    
        <div class="info-text">
        <p>
        Эмуляция лабораторного стенда:
        </p>
        </div> 
<div class="uos">

  <h2>Частотный детектор УОС-03</h2>

  <div class="controls">

    <!-- Сигнал -->
    <div class="block">
      <h3>Сигнал</h3>

      <div class="control-row">
        <label>Частота (кГц)</label>
        <input type="number" id="fc" min="250" max="6500" value="1000">
      </div>

      <div class="control-row">
        <label>Амплитуда (В)</label>
        <input type="number" id="uc" min="0" max="1.0" step="0.1" value="0.5">
      </div>
    </div>
    <div class="block">
      <h3>Гетеродин</h3>

      <div class="control-row">
        <label>Частота (кГц)</label>
        <input type="number" id="fg" min="500" max="6500" value="1500">
      </div>
    </div>
    <!-- Добротность -->
    <div class="block">
      <h3>Добротность</h3>

      <div class="control-row">
        <label for="q1">Контур Q1</label>
        <input type="checkbox" id="q1" value="1" checked>
      </div>

      <div class="control-row">
        <label for="q2">Контур Q2</label>
        <input type="checkbox" id="q2" value="1">
      </div>
    </div>

    <!-- Детектор -->
    <div class="block">
      <h3>Детектор</h3>

      <div class="detector-group">
        <button data-det="1" class="det active">1</button>
        <button data-det="2" class="det">2</button>
        <button data-det="3" class="det">3</button>
      </div>
    </div>

    <!-- Режим -->
    <div class="block">
      <h3>Режим работы</h3>
      <select id="mode">
        <option value="1">Задание 1</option>
        <option value="2">Задание 2</option>
        <option value="3">Задание 3</option>
        <option value="4">Задание 4</option>
        <option value="5">Задание 5</option>
      </select>
    </div>

  </div>

  <!-- Экран -->
  <div class="screen" id="screen"></div>
</div>


        
</div> 

    
    </div>
</div>

  
<div id="include-footer"></div>
<script src="/panoramaepta/scripts/stand-antenna.js"></script>
<script src="/panoramaepta/scripts/include.js"></script>

</body>
</html>
