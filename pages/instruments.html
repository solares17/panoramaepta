<!DOCTYPE html>
<html lang="ru">
<head>
<title>Антенно-фидерные устройства</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../style.css">

</head>

<body>
    
<div id="include-header"></div>

<div class="page-content">
<div class="content-container"> 


    <!-- Контейнер для сетки оборудования -->
<div class="equipment-gallery" id="equipmentGallery"></div>

<!-- Всплывающее окно (Модалка), которое будет открываться по клику -->
<div class="equip-modal" id="equipModal">
    <div class="equip-modal-content">
        <!-- Кнопка закрытия (крестик) -->
        <span class="close-modal" id="closeModal">&times;</span>
        
        <!-- Сюда JS будет подставлять картинку и текст -->
        <img src="" id="modalImg" alt="Оборудование">
        <div class="equip-modal-text">
            <h3 id="modalTitle">Название</h3>
            <p id="modalDesc">Описание...</p>
        </div>
    </div>
</div>



</div>

    
</div>

  
<div id="include-footer"></div>

<script src="../scripts/include.js"></script>
<script src="../scripts/chat.js"></script>
</body>
</html>
